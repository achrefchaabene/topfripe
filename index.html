<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Fripe - Sami Hedi</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: #f9f9fb;
            color: #222222;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border: 1px solid rgba(139, 94, 60, 0.15);
            border-radius: 28px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(139, 94, 60, 0.06), 0 0 25px rgba(0, 0, 0, 0.03);
        }

        .logo-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #222222;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 14px;
            color: #8b5e3c;
            margin-bottom: 30px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 52px;
            padding: 15px 20px;
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            line-height: 1.25;
            border-radius: 14px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn:hover,
        .btn:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-fb-1 {
            background-color: #1877f2;
        }

        .btn-insta {
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
        }

        .btn-tiktok {
            background-color: #000000;
        }

        .btn-wa {
            background-color: #25d366;
        }

        .btn-location {
            background-color: #5856d6;
        }

        .footer {
            margin-top: 35px;
            font-size: 11px;
            color: #aaaaaa;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="logo-container">
            <img src="image_be8ae8.jpg" alt="Logo Top Fripe - Sami Hedi">
        </div>

        <h1>Top Fripe</h1>
        <div class="tagline">Sami Hedi</div>

        <div class="links-wrapper">
            <a href="https://www.facebook.com/share/1BzADuL6Lt/?mibextid=wwXIfr" class="btn btn-fb-1" target="_blank" rel="noopener noreferrer">Page Facebook</a>
            <a href="https://www.instagram.com/topfripe202" class="btn btn-insta" target="_blank" rel="noopener noreferrer">Instagram (@topfripe202)</a>
            <a href="https://www.tiktok.com/@lasslass82?is_from_webapp=1&amp;sender_device=pc" class="btn btn-tiktok" target="_blank" rel="noopener noreferrer">TikTok (@lasslass82)</a>
            <a href="https://wa.me/21655859891" class="btn btn-wa" target="_blank" rel="noopener noreferrer">Contact WhatsApp Direct</a>
            <a href="https://maps.apple/p/-RKpBgI4yKaaCE" class="btn btn-location" target="_blank" rel="noopener noreferrer">Notre Localisation (Apple Maps)</a>
        </div>

        <div class="footer">
            © 2026 Top Fripe. Tous droits réservés.
        </div>
    </main>
</body>
</html>
